name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          ENV: ci
          DATABASE_URL: sqlite:///./ci.db
          FRED_API_KEY: ""
          CACHE_TTL_MINUTES: "1440"
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t riesgo-backend:ci ./backend
      - name: Check image size
        run: |
          size_mb=$(docker image inspect riesgo-backend:ci --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "Imagen: ${size_mb} MB"
          if [ "$size_mb" -gt 600 ]; then
            echo "ADVERTENCIA: imagen mayor a 600 MB"
          fi
